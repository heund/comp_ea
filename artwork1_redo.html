<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Machine Correction Network AR">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="./manifest.json">
    <title>AR Desktop Development - Artwork 1 Machine Correction Network</title>
    
    <!-- A-Frame for AR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js for marker tracking -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <!-- Three.js for 3D visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- iOS-style Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Shared PWA Resources -->
    <link rel="stylesheet" href="./shared/common.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background: transparent;
            overflow: hidden;
        }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-hover: rgba(255, 255, 255, 0.15);
            --glass-white: rgba(255, 255, 255, 0.9);
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-darkest: rgba(0, 0, 0, 0.3);
        }
        
        /* Reset body and html for AR with iOS safe area handling */
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* AR Scene - minimal setup */
        a-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        
        .ar-status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            z-index: 30;
            display: block;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        /* AR Controls Container */
        .ar-controls-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease;
        }

        .ar-controls-container.ar-active {
            opacity: 1;
            visibility: visible;
        }

        .ar-title {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #000000;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .ar-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: #000000;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            opacity: 0.8;
        }

        .control-btn:hover {
            background: var(--glass-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .control-btn.active {
            background: var(--glass-hover);
            opacity: 1;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        
        /* 3D Visualization Container - Only visible when marker detected */
        .visualization-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .visualization-container.active {
            opacity: 1;
            visibility: visible;
        }

        #visualizationCanvas {
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: grab;
        }

        #visualizationCanvas:active {
            cursor: grabbing;
        }

        /* Data Panel */
        .data-panel {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .data-panel.active {
            opacity: 1;
            visibility: visible;
        }

        .data-title {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--glass-white);
            margin-bottom: 15px;
            text-align: center;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .data-item {
            background: var(--glass-darkest);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .data-label {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 11px;
            color: var(--glass-light);
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--glass-white);
        }

        .data-unit {
            font-size: 10px;
            color: var(--glass-light);
            margin-left: 2px;
        }

        /* Circular Progress */
        .circular-progress {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            stroke: var(--glass-border);
            stroke-width: 3;
            fill: transparent;
            r: 35;
            cx: 40;
            cy: 40;
        }

        .progress-ring__progress {
            stroke: #00ff88;
            stroke-width: 3;
            fill: transparent;
            r: 35;
            cx: 40;
            cy: 40;
            stroke-dasharray: 220;
            stroke-dashoffset: 220;
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 600;
            color: var(--glass-white);
        }

        /* Futuristic Data Overlay with Dynamic Scaling - EXACT copy from artwork1.html */
        .data-overlay {
            --popup-scale: 1.0;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(calc(0.8 * var(--popup-scale)));
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            backdrop-filter: blur(20px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2000;
            pointer-events: none;
        }
        
        .data-overlay.active {
            transform: translate(-50%, -50%) scale(calc(1.0 * var(--popup-scale)));
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .data-overlay.fade-out {
            transform: translate(-50%, -50%) scale(calc(0.9 * var(--popup-scale)));
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .data-overlay-inner {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .data-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        .metric-label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .data-overlay-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .data-overlay-close:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }
        
        /* Audio Progress Bar - EXACT copy from artwork1.html */
        .audio-progress-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            z-index: 1003;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .audio-progress-container.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .audio-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .audio-title {
            font-size: 12px;
            color: #000000; /* Black text for gallery visibility */
            font-weight: 500;
        }
        
        .audio-time {
            font-size: 11px;
            color: #000000; /* Black text for gallery visibility */
            font-family: 'Inter', sans-serif;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--glass-darkest);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #000000; /* Black progress bar for gallery visibility */
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s ease;
        }
        
        .overlay-rings {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .ring {
            position: absolute;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            pointer-events: none;
        }
        
        /* Single Metric Display */
        .single-metric {
            text-align: center;
            padding: 30px;
        }
        
        .metric-value-large {
            font-size: 64px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            line-height: 1;
        }
        
        .metric-unit {
            font-size: 24px;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
            margin-bottom: 15px;
        }
        
        .metric-label-large {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Mobile responsive */
        @media screen and (max-width: 768px) {
            .data-panel {
                right: 10px;
                width: 240px;
                padding: 15px;
            }
            
            .ar-controls-container {
                bottom: 20px;
            }
            
            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }
            
            .data-overlay {
                width: 240px;
                height: 240px;
            }
        }
    </style>
</head>
<body>
    <div class="ar-status" id="arStatus">AR Ready</div>
    
    <!-- Audio Element - iOS compatible - EXACT copy from artwork1.html -->
    <audio id="artworkAudio" preload="metadata" playsinline webkit-playsinline>
        <source src="./artwork1 demo1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- A-Frame AR Scene -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        id="arScene">
        
        <!-- AR Marker -->
        <a-marker
            type="pattern"
            url="./pattern-ar_code_test1.patt"
            id="marker"
            smooth="true">
            <!-- Just marker detection, no 3D objects -->
        </a-marker>
        
        <!-- Camera -->
        <a-camera></a-camera>
    </a-scene>

    <!-- 3D Visualization Container -->
    <div class="visualization-container" id="visualizationContainer">
        <canvas id="visualizationCanvas"></canvas>
        
        <!-- Futuristic Data Overlay - EXACT copy from artwork1.html -->
        <div class="data-overlay" id="dataOverlay">
            <div class="overlay-rings">
                <div class="ring"></div>
                <div class="ring"></div>
            </div>
            <div class="data-content">
                <div class="metric-value-large" id="metricValue">1247</div>
                <div class="metric-unit" id="metricUnit">kN</div>
                <div class="metric-label-large" id="metricLabel">Rolling Force</div>
            </div>
            <div class="data-overlay-close" id="overlayClose">×</div>
        </div>
    </div>

    <!-- Audio Progress Bar - EXACT copy from artwork1.html -->
    <div class="audio-progress-container" id="audioProgress">
        <div class="audio-info">
            <div class="audio-title">Machine Correction Audio</div>
            <div class="audio-time" id="audioTime">0:00 / 0:00</div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- AR Controls -->
    <div class="ar-controls-container" id="arControlsContainer">
        <div class="ar-title">연간압연 데이터 01: 보정 알고리즘 구조</div>
        <div class="ar-controls">
            <button class="control-btn" id="dataBtn" title="Reveal Data"><i class="bi bi-bar-chart-fill"></i></button>
            <button class="control-btn" id="audioBtn" title="Toggle Audio"><i class="bi bi-volume-up-fill"></i></button>
            <button class="control-btn" id="exitBtn" title="Exit to Gallery"><i class="bi bi-x-circle-fill"></i></button>
        </div>
    </div>

    <!-- Data Panel -->
    <div class="data-panel" id="dataPanel">
        <div class="data-title">네트워크 분석</div>
        
        <div class="circular-progress">
            <svg class="progress-ring" width="80" height="80">
                <circle class="progress-ring__circle" />
                <circle class="progress-ring__progress" id="progressCircle" />
            </svg>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <div class="data-grid">
            <div class="data-item">
                <div class="data-label">노드 수</div>
                <div class="data-value" id="nodeCount">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">연결 수</div>
                <div class="data-value" id="edgeCount">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">클러스터</div>
                <div class="data-value" id="clusterCount">0</div>
            </div>
            <div class="data-item">
                <div class="data-label">밀도</div>
                <div class="data-value" id="density">0.0<span class="data-unit">%</span></div>
            </div>
        </div>
    </div>
    
    <script>
        // Embedded sample data from artwork1.html
        const sampleData = [
            {current_corrections_count: 2, data_integrity: 0.85, correction_effectiveness: 0.78, active_corrections_count: 5},
            {current_corrections_count: 3, data_integrity: 0.92, correction_effectiveness: 0.81, active_corrections_count: 7},
            {current_corrections_count: 1, data_integrity: 0.76, correction_effectiveness: 0.69, active_corrections_count: 3},
            {current_corrections_count: 4, data_integrity: 0.88, correction_effectiveness: 0.85, active_corrections_count: 8},
            {current_corrections_count: 2, data_integrity: 0.91, correction_effectiveness: 0.77, active_corrections_count: 6}
        ];
        
        // Global variables - exact same as artwork1.html
        let scene, camera, renderer;
        let networkNodes = [], networkEdges = [], centralCore = null;
        let networkGraph = { nodes: [] };
        let isAnimating = true, isWireframe = false;
        let colorSchemeIndex = 0;
        
        // Data hotspot variables
        let dataUpdateInterval = null;
        let hotspotsActive = false;
        
        // Data flow visualization variables
        let dataFlowPulses = [];
        let dataFlowInterval = null;
        let pulseGeometry = null;
        let pulseMaterial = null;
        
        // Audio variables - Global scope
        let audioElement = null;
        let audioPlaying = false;
        let audioProgressInterval = null;
        
        const colorSchemes = [
            { name: 'UserGreyGradient', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] },
            { name: 'GreyGradientAlt', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] },
            { name: 'MonochromeGradient', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] },
            { name: 'GreyScale', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] }
        ];
        
        // AR Trigger System - EXACT copy from artwork1.html
        class ARTriggerSystem {
            constructor() {
                this.isMarkerVisible = false;
                this.experienceTriggered = false;
                this.dataRevealed = false;
                this.simulationActive = false;
                
                this.currentDataset = 0;
                this.overlayVisible = false;
                this.dataUpdateInterval = null;
                this.mouse = new THREE.Vector2();
                this.raycaster = new THREE.Raycaster();
                
                this.initializeAR();
                this.setupEventListeners();
                this.initializeThreeJS();
            }
            
            initializeAR() {
                const marker = document.querySelector('#marker');
                if (marker) {
                    marker.addEventListener('markerFound', () => {
                        this.isMarkerVisible = true;
                        if (!this.experienceTriggered) {
                            this.experienceTriggered = true;
                            this.showVisualization();
                        }
                        // Update AR status
                        const arStatus = document.getElementById('arStatus');
                        arStatus.innerHTML = '✅ AR Marker Found!';
                        arStatus.style.background = 'rgba(0,128,0,0.7)';
                    });
                    
                    marker.addEventListener('markerLost', () => {
                        this.isMarkerVisible = false;
                        // Update AR status
                        const arStatus = document.getElementById('arStatus');
                        arStatus.innerHTML = '🔍 Looking for AR Marker...';
                        arStatus.style.background = 'rgba(0,0,0,0.7)';
                    });
                }
            }
            
            showVisualization() {
                const container = document.getElementById('visualizationContainer');
                const controls = document.getElementById('arControlsContainer');
                
                if (container) {
                    container.classList.add('active');
                }
                if (controls) {
                    controls.classList.add('ar-active');
                }
            }
            
            initializeThreeJS() {
                const canvas = document.getElementById('visualizationCanvas');
                if (!canvas) return;
                
                const container = canvas.parentElement;
                const width = container.clientWidth;
                const height = container.clientHeight;
                
                // Scene setup - exact same as artwork1.html
                scene = new THREE.Scene();
                scene.background = null;
                
                // Camera setup
                camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
                const minDimension = Math.min(width, height);
                const scaleFactor = this.calculateScaleFactor(minDimension);
                const baseDistance = 20;
                const distance = baseDistance * scaleFactor;
                camera.position.set(distance, distance * 0.6, distance);
                camera.lookAt(0, 0, 0);
                
                // Renderer setup
                renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
                renderer.setSize(width, height);
                renderer.setClearColor(0x000000, 0);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // Lighting
                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(50, 50, 50);
                scene.add(directionalLight);
                
                this.setupMouseControls();
                this.createCorrectionNetwork();
                this.animate();
                
                window.addEventListener('resize', () => this.onWindowResize());
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => this.onWindowResize(), 100);
                });
            }
            
            calculateScaleFactor(minDimension) {
                if (minDimension < 400) return 0.7;
                if (minDimension < 600) return 0.85;
                if (minDimension < 800) return 1.0;
                return 1.2;
            }
            
            createCorrectionNetwork() {
                const n_nodes = 800;
                const coreRadius = 1.5, sphereRadius = 15;
                
                networkGraph.nodes = [];
                
                // Create 800 nodes in 3D spherical distribution
                for (let i = 0; i < n_nodes; i++) {
                    const row = sampleData[i % sampleData.length];
                    const variation = (Math.random() - 0.5) * 0.2;
                    
                    const correctionIntensity = Math.min(1.0, (row.current_corrections_count + variation) / 5.0);
                    const systemHealth = Math.min(1.0, ((row.data_integrity + row.correction_effectiveness) / 2.0) + variation * 0.1);
                    const correctionBurden = Math.min(1.0, (row.active_corrections_count + Math.floor(variation * 3)) / 10.0);
                    
                    // Generate 3D position using rejection sampling
                    let x, y, z, distanceSquared;
                    do {
                        x = (Math.random() - 0.5) * 2;
                        y = (Math.random() - 0.5) * 2;
                        z = (Math.random() - 0.5) * 2;
                        distanceSquared = x*x + y*y + z*z;
                    } while (distanceSquared > 1 || distanceSquared < 0.01);
                    
                    const unitDistance = Math.sqrt(distanceSquared);
                    const minDistance = coreRadius + 0.5;
                    const actualDistance = minDistance + (unitDistance * (sphereRadius - minDistance));
                    
                    x = (x / unitDistance) * actualDistance;
                    y = (y / unitDistance) * actualDistance;
                    z = (z / unitDistance) * actualDistance;
                    
                    networkGraph.nodes.push({
                        id: i, intensity: correctionIntensity, health: systemHealth, burden: correctionBurden,
                        x: x, y: y, z: z, vx: 0, vy: 0, vz: 0
                    });
                }
                
                this.createSolidCore();
                this.createNetworkVisualization();
            }
            
            createSolidCore() {
                const coreGeometry = new THREE.SphereGeometry(1.5, 32, 32);
                const currentScheme = colorSchemes[colorSchemeIndex];
                const coreMaterial = new THREE.MeshLambertMaterial({
                    color: new THREE.Color(currentScheme.colors[currentScheme.colors.length - 1])
                });
                
                centralCore = new THREE.Mesh(coreGeometry, coreMaterial);
                centralCore.castShadow = true;
                scene.add(centralCore);
            }
            
            createNetworkVisualization() {
                // Clear existing nodes and edges
                networkNodes.forEach(node => scene.remove(node));
                networkEdges.forEach(edge => scene.remove(edge));
                networkNodes.length = 0;
                networkEdges.length = 0;
                
                // Create hub-to-node connections
                const currentScheme = colorSchemes[colorSchemeIndex];
                const edgeColor = new THREE.Color(currentScheme.colors[currentScheme.colors.length - 2]);
                
                networkGraph.nodes.forEach((node, i) => {
                    // Create connection from center to node
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array([0, 0, 0, node.x, node.y, node.z]);
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    
                    const material = new THREE.LineBasicMaterial({
                        color: edgeColor, transparent: true, opacity: 0.7
                    });
                    
                    const edge = new THREE.Line(geometry, material);
                    edge.userData = { type: 'hub-connection', nodeIndex: i };
                    scene.add(edge);
                    networkEdges.push(edge);
                    
                    // Create optimized node mesh
                    const nodeGeometry = new THREE.SphereGeometry(0.2, 12, 12);
                    const colorIndex = Math.floor(node.intensity * (currentScheme.colors.length - 1));
                    const nodeMaterial = new THREE.MeshBasicMaterial({
                        color: new THREE.Color(currentScheme.colors[colorIndex]),
                        transparent: true, 
                        opacity: 0.8, 
                        wireframe: isWireframe
                    });
                    
                    const nodeMesh = new THREE.Mesh(nodeGeometry, nodeMaterial);
                    nodeMesh.position.set(node.x, node.y, node.z);
                    scene.add(nodeMesh);
                    networkNodes.push(nodeMesh);
                });
            }
            
            setupMouseControls() {
                const canvas = document.getElementById('visualizationCanvas');
                let isInteracting = false;
                let previousMousePosition = { x: 0, y: 0 };
                let previousTouchDistance = 0;
                
                // Mouse controls
                canvas.addEventListener('mousedown', (event) => {
                    isInteracting = true;
                    previousMousePosition = { x: event.clientX, y: event.clientY };
                    canvas.style.cursor = 'grabbing';
                    event.preventDefault();
                });
                
                canvas.addEventListener('mouseup', () => {
                    isInteracting = false;
                    canvas.style.cursor = 'grab';
                });
                
                canvas.addEventListener('mouseleave', () => {
                    isInteracting = false;
                    canvas.style.cursor = 'grab';
                });
                
                canvas.addEventListener('mousemove', (event) => {
                    if (!isInteracting) return;
                    
                    const deltaX = event.clientX - previousMousePosition.x;
                    const deltaY = event.clientY - previousMousePosition.y;
                    
                    this.rotateCamera(deltaX, deltaY);
                    
                    previousMousePosition = { x: event.clientX, y: event.clientY };
                    event.preventDefault();
                });
                
                // Mouse wheel zoom
                canvas.addEventListener('wheel', (event) => {
                    const zoomSpeed = 0.1;
                    const zoomDirection = event.deltaY > 0 ? 1 : -1;
                    this.zoomCamera(zoomDirection * zoomSpeed);
                    event.preventDefault();
                });
                
                // Touch controls for mobile
                canvas.addEventListener('touchstart', (event) => {
                    event.preventDefault();
                    
                    if (event.touches.length === 1) {
                        isInteracting = true;
                        const touch = event.touches[0];
                        previousMousePosition = { x: touch.clientX, y: touch.clientY };
                    } else if (event.touches.length === 2) {
                        const touch1 = event.touches[0];
                        const touch2 = event.touches[1];
                        const distance = Math.sqrt(
                            Math.pow(touch2.clientX - touch1.clientX, 2) +
                            Math.pow(touch2.clientY - touch1.clientY, 2)
                        );
                        previousTouchDistance = distance;
                    }
                });
                
                canvas.addEventListener('touchmove', (event) => {
                    event.preventDefault();
                    
                    if (event.touches.length === 1 && isInteracting) {
                        const touch = event.touches[0];
                        const deltaX = touch.clientX - previousMousePosition.x;
                        const deltaY = touch.clientY - previousMousePosition.y;
                        
                        this.rotateCamera(deltaX, deltaY);
                        
                        previousMousePosition = { x: touch.clientX, y: touch.clientY };
                    } else if (event.touches.length === 2) {
                        const touch1 = event.touches[0];
                        const touch2 = event.touches[1];
                        const distance = Math.sqrt(
                            Math.pow(touch2.clientX - touch1.clientX, 2) +
                            Math.pow(touch2.clientY - touch1.clientY, 2)
                        );
                        
                        if (previousTouchDistance > 0) {
                            const zoomDelta = (distance - previousTouchDistance) * 0.01;
                            this.zoomCamera(-zoomDelta);
                        }
                        
                        previousTouchDistance = distance;
                    }
                });
                
                canvas.addEventListener('touchend', (event) => {
                    event.preventDefault();
                    isInteracting = false;
                    previousTouchDistance = 0;
                });
            }
            
            rotateCamera(deltaX, deltaY) {
                const rotationSpeed = 0.005;
                const spherical = new THREE.Spherical();
                spherical.setFromVector3(camera.position);
                
                spherical.theta -= deltaX * rotationSpeed;
                spherical.phi += deltaY * rotationSpeed;
                
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
                
                camera.position.setFromSpherical(spherical);
                camera.lookAt(0, 0, 0);
            }
            
            zoomCamera(delta) {
                const direction = camera.position.clone().normalize();
                const newPosition = camera.position.clone().add(direction.multiplyScalar(delta));
                
                const minDistance = 5;
                const maxDistance = 100;
                const distance = newPosition.length();
                
                if (distance >= minDistance && distance <= maxDistance) {
                    camera.position.copy(newPosition);
                }
            }
            
            setupEventListeners() {
                document.getElementById('dataBtn').addEventListener('click', () => {
                    this.toggleDataOverlay();
                });
                
                document.getElementById('audioBtn').addEventListener('click', () => {
                    this.toggleAudio();
                });
                
                document.getElementById('exitBtn').addEventListener('click', () => {
                    this.resetExperience();
                });
                
                // Data overlay event handlers - EXACT copy from artwork1.html
                document.getElementById('overlayClose').addEventListener('click', () => {
                    this.hideDataOverlay();
                });
                
                document.getElementById('dataOverlay').addEventListener('click', (event) => {
                    if (event.target === document.getElementById('dataOverlay') || 
                        event.target.closest('.data-content')) {
                        this.cycleToNextDataset();
                    }
                });
                
                // Window-level click detection for nodes - EXACT copy from artwork1.html
                window.addEventListener('mousedown', (event) => {
                    this.mouseDownPos = { x: event.clientX, y: event.clientY };
                    this.isDragging = false;
                });
                
                window.addEventListener('mousemove', (event) => {
                    if (this.mouseDownPos) {
                        const deltaX = Math.abs(event.clientX - this.mouseDownPos.x);
                        const deltaY = Math.abs(event.clientY - this.mouseDownPos.y);
                        if (deltaX > 5 || deltaY > 5) {
                            this.isDragging = true;
                        }
                    }
                });
                
                window.addEventListener('mouseup', (event) => {
                    if (event.target === document.getElementById('visualizationCanvas') && !this.isDragging) {
                        this.handleNodeClick(event, document.getElementById('visualizationCanvas'));
                    }
                    this.mouseDownPos = null;
                    this.isDragging = false;
                });
                
                // Touch events for iPad/mobile support - EXACT copy from artwork1.html
                let touchStartPos = { x: 0, y: 0 };
                let isTouchDragging = false;
                const touchDragThreshold = 10;
                
                window.addEventListener('touchstart', (event) => {
                    if (event.touches.length === 1) {
                        const touch = event.touches[0];
                        touchStartPos = { x: touch.clientX, y: touch.clientY };
                        isTouchDragging = false;
                    }
                }, { passive: false });
                
                window.addEventListener('touchmove', (event) => {
                    if (event.touches.length === 1) {
                        const touch = event.touches[0];
                        const dx = touch.clientX - touchStartPos.x;
                        const dy = touch.clientY - touchStartPos.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance > touchDragThreshold) {
                            isTouchDragging = true;
                        }
                    }
                }, { passive: false });
                
                window.addEventListener('touchend', (event) => {
                    if (event.changedTouches.length === 1 && !isTouchDragging) {
                        const touch = event.changedTouches[0];
                        const target = document.elementFromPoint(touch.clientX, touch.clientY);
                        
                        if (target === document.getElementById('visualizationCanvas') || 
                            document.getElementById('visualizationCanvas').contains(target)) {
                            const syntheticEvent = {
                                clientX: touch.clientX,
                                clientY: touch.clientY,
                                target: document.getElementById('visualizationCanvas')
                            };
                            this.handleNodeClick(syntheticEvent, document.getElementById('visualizationCanvas'));
                        }
                    }
                    isTouchDragging = false;
                }, { passive: false });
            }
            
            toggleDataOverlay() {
                if (this.overlayVisible) {
                    this.hideDataOverlay();
                } else {
                    this.showDataOverlay();
                }
            }
            
            // Data overlay system methods - EXACT copy from artwork1.html
            handleNodeClick(event, canvas) {
                const rect = canvas.getBoundingClientRect();
                this.mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                this.mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                this.raycaster.setFromCamera(this.mouse, camera);
                
                const clickableObjects = [];
                scene.traverse((child) => {
                    // Include both mesh objects (nodes) and line objects (connections)
                    if (child.isMesh || child.isLine || child.isLineSegments || child.type === 'Line') {
                        clickableObjects.push(child);
                    }
                });
                
                const intersects = this.raycaster.intersectObjects(clickableObjects);
                if (intersects.length > 0) {
                    if (this.overlayVisible) {
                        this.cycleToNextDataset();
                    } else {
                        this.showDataOverlay();
                    }
                }
            }
            
            showDataOverlay() {
                this.overlayVisible = true;
                const overlay = document.getElementById('dataOverlay');
                overlay.classList.add('active');
                this.startDataCycling();
            }
            
            hideDataOverlay() {
                this.overlayVisible = false;
                const overlay = document.getElementById('dataOverlay');
                overlay.classList.remove('active');
                this.stopDataCycling();
            }
            
            cycleToNextDataset() {
                this.currentDataset = (this.currentDataset + 1) % 4;
                this.updateOverlayData();
            }
            
            updateOverlayData() {
                const datasets = [
                    { title: 'Core Efficiency', unit: '%', baseValue: 87.3 },
                    { title: 'Network Load', unit: '%', baseValue: 64.2 },
                    { title: 'Active Corrections', unit: '', baseValue: 142 },
                    { title: 'Data<br>Integrity', unit: '%', baseValue: 91.8 }
                ];
                
                const dataset = datasets[this.currentDataset];
                document.getElementById('metricLabel').innerHTML = dataset.title;
                document.getElementById('metricUnit').textContent = dataset.unit;
                
                // Start with base value, will be updated by cycling
                document.getElementById('metricValue').textContent = dataset.baseValue;
            }
            
            startDataCycling() {
                if (this.dataUpdateInterval) return;
                
                this.dataUpdateInterval = setInterval(() => {
                    this.updateDynamicData();
                }, 150); // Update every 150ms for rapid cycling
            }
            
            stopDataCycling() {
                if (this.dataUpdateInterval) {
                    clearInterval(this.dataUpdateInterval);
                    this.dataUpdateInterval = null;
                }
            }
            
            updateDynamicData() {
                const datasets = [
                    { title: 'Core Efficiency', unit: '%', baseValue: 87.3, range: 15 },
                    { title: 'Network Load', unit: '%', baseValue: 64.2, range: 20 },
                    { title: 'Active Corrections', unit: '', baseValue: 142, range: 30 },
                    { title: 'Data<br>Integrity', unit: '%', baseValue: 91.8, range: 8 }
                ];
                
                const dataset = datasets[this.currentDataset];
                const variation = (Math.random() - 0.5) * dataset.range;
                const newValue = Math.max(0, dataset.baseValue + variation);
                
                // Format the value appropriately
                const formattedValue = dataset.unit === '' ? Math.round(newValue) : newValue.toFixed(1);
                document.getElementById('metricValue').textContent = formattedValue;
            }
            
            toggleAudio() {
                if (!audioElement) {
                    audioElement = document.getElementById('artworkAudio');
                }
                
                if (!audioElement) {
                    console.error('Audio element not found');
                    return;
                }
                
                const audioBtn = document.getElementById('audioBtn');
                const audioProgress = document.getElementById('audioProgress');
                
                if (audioPlaying) {
                    audioElement.pause();
                    audioPlaying = false;
                    audioBtn.innerHTML = '<i class="bi bi-volume-up-fill"></i>';
                    audioBtn.classList.remove('active');
                    audioProgress.classList.remove('visible');
                    
                    if (audioProgressInterval) {
                        clearInterval(audioProgressInterval);
                        audioProgressInterval = null;
                    }
                } else {
                    audioElement.play().then(() => {
                        audioPlaying = true;
                        audioBtn.innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
                        audioBtn.classList.add('active');
                        audioProgress.classList.add('visible');
                        
                        this.startAudioProgress();
                    }).catch(error => {
                        console.error('Audio play failed:', error);
                    });
                }
            }
            
            startAudioProgress() {
                this.audioProgressInterval = setInterval(() => {
                    this.updateAudioProgress();
                    this.updateAudioTime();
                }, 1000);
            }
            
            updateAudioProgress() {
                if (audioElement && audioElement.duration) {
                    const progress = (audioElement.currentTime / audioElement.duration) * 100;
                    const progressFill = document.getElementById('progressFill');
                    progressFill.style.width = progress + '%';
                }
            }
            
            updateAudioTime() {
                if (audioElement) {
                    const current = this.formatTime(audioElement.currentTime || 0);
                    const duration = this.formatTime(audioElement.duration || 0);
                    const timeDisplay = document.getElementById('audioTime');
                    timeDisplay.textContent = `${current} / ${duration}`;
                }
            }
            
            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            updateDataPanel() {
                // Update data panel with network statistics
                document.getElementById('nodeCount').textContent = networkGraph.nodes.length;
                document.getElementById('edgeCount').textContent = networkEdges.length;
                document.getElementById('clusterCount').textContent = Math.floor(networkGraph.nodes.length / 100);
                document.getElementById('density').innerHTML = '75.2<span class="data-unit">%</span>';
                
                // Update progress circle
                const progress = 75.2;
                const circle = document.getElementById('progressCircle');
                const circumference = 2 * Math.PI * 35;
                const offset = circumference - (progress / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                document.getElementById('progressText').textContent = Math.round(progress) + '%';
            }
            
            resetExperience() {
                // Reset everything
                this.experienceTriggered = false;
                const container = document.getElementById('visualizationContainer');
                const controls = document.getElementById('arControlsContainer');
                const dataPanel = document.getElementById('dataPanel');
                
                if (container) container.classList.remove('active');
                if (controls) controls.classList.remove('ar-active');
                if (dataPanel) dataPanel.classList.remove('active');
                
                this.resetCameraPosition();
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                if (isAnimating && centralCore) {
                    centralCore.rotation.y += 0.005;
                    centralCore.rotation.x += 0.002;
                }
                
                if (renderer && scene && camera) {
                    renderer.render(scene, camera);
                }
            }
            
            onWindowResize() {
                const canvas = document.getElementById('visualizationCanvas');
                if (!canvas || !camera || !renderer) return;
                
                const container = canvas.parentElement;
                const width = container.clientWidth;
                const height = container.clientHeight;
                
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            }
        }
        
        // Initialize AR system
        let arTrigger;
        
        // Auto-start AR when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const arStatus = document.getElementById('arStatus');
            arStatus.innerHTML = '🔍 Looking for AR Marker...';
            
            console.log('Auto-starting AR...');
            console.log('Viewport:', window.innerWidth, 'x', window.innerHeight);
            
            // Initialize AR trigger system
            arTrigger = new ARTriggerSystem();
        });
        
        // Disable device motion/orientation permissions to prevent invasive prompts
        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
            DeviceMotionEvent.requestPermission = () => Promise.resolve('denied');
        }
        if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
            DeviceOrientationEvent.requestPermission = () => Promise.resolve('denied');
        }
        
        // Log initial viewport info
        console.log('Page loaded - Viewport:', window.innerWidth, 'x', window.innerHeight);
        console.log('User Agent:', navigator.userAgent);
    </script>
