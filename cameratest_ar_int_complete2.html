<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Camera + AR Test</title>
    
    <!-- A-Frame for AR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js for marker tracking -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <!-- Three.js for 3D visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Bootstrap Icons for UI buttons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-hover: rgba(255, 255, 255, 0.15);
            --glass-white: rgba(255, 255, 255, 0.9);
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-darkest: rgba(0, 0, 0, 0.3);
        }
        
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
        }
        
        .button {
            padding: 15px 30px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
            backdrop-filter: blur(10px);
        }
        
        .button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 10;
            display: none;
            transition: none;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: none;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 20;
            display: none;
        }
        
        /* AR Scene - minimal setup */
        a-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        
        .ar-status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            z-index: 30;
            display: block;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        /* Three.js Visualization Container - Only visible when marker detected */
        .visualization-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .visualization-container.active {
            opacity: 1;
            visibility: visible;
        }
        
        #visualizationCanvas {
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: grab;
        }
        
        #visualizationCanvas:active {
            cursor: grabbing;
        }
        
        /* Circular Data Overlay - EXACT copy from artwork1.html */
        .data-overlay {
            --popup-scale: 1.0; /* CSS custom property for dynamic scaling */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(calc(0.8 * var(--popup-scale)));
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            backdrop-filter: blur(20px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2000;
            pointer-events: none;
        }
        
        .data-overlay.active {
            transform: translate(-50%, -50%) scale(calc(1.0 * var(--popup-scale)));
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .data-overlay.fade-out {
            transform: translate(-50%, -50%) scale(calc(0.9 * var(--popup-scale)));
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .data-overlay-inner {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .data-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        .metric-label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .data-overlay-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .data-overlay-close:hover {
            background: rgba(255,255,255,0.4);
            border-color: rgba(255,255,255,0.8);
            transform: scale(1.1);
        }
        
        /* Ring CSS removed to match artwork1 exactly - rings exist in HTML but are invisible */
        
        /* Single Metric Display */
        .single-metric {
            text-align: center;
            padding: 30px;
        }
        
        .metric-value-large {
            font-size: 64px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            line-height: 1;
        }
        
        .metric-unit {
            font-size: 24px;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
            margin-bottom: 15px;
        }
        
        .metric-label-large {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* AR Controls - EXACT copy from artwork1.html */
        .ar-controls-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease;
        }

        .ar-controls-container.ar-active {
            opacity: 1;
            visibility: visible;
        }

        .ar-title {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #000000;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .ar-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: #000000;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            opacity: 0.8;
        }

        .control-btn:hover {
            background: var(--glass-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .control-btn.active {
            background: var(--glass-hover);
            opacity: 1;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        
        /* Mobile responsive */
        @media screen and (max-width: 768px) {
            .ar-controls-container {
                bottom: 20px;
            }
            
            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="ar-status" id="arStatus">AR Ready</div>
    
    <!-- Three.js Visualization Container -->
    <div class="visualization-container" id="visualizationContainer">
        <canvas id="visualizationCanvas"></canvas>
        
        <!-- Futuristic Data Overlay - EXACT copy from artwork1.html -->
        <div class="data-overlay" id="dataOverlay">
            <div class="overlay-rings">
                <div class="ring"></div>
                <div class="ring"></div>
            </div>
            <div class="data-content">
                <div class="metric-value-large" id="metricValue">1247</div>
                <div class="metric-unit" id="metricUnit">kN</div>
                <div class="metric-label-large" id="metricLabel">Rolling Force</div>
            </div>
            <div class="data-overlay-close" id="overlayClose">×</div>
        </div>
    </div>
    
    <!-- AR Controls - EXACT copy from artwork1.html -->
    <div class="ar-controls-container">
        <div class="ar-title">연간압연 데이터 01: 보정 알고리즘 구조</div>
        <div class="ar-controls">
            <button class="control-btn" id="dataBtn" title="Reveal Data"><i class="bi bi-bar-chart-fill"></i></button>
            <button class="control-btn" id="audioBtn" title="Toggle Audio"><i class="bi bi-volume-up-fill"></i></button>
            <button class="control-btn" id="exitBtn" title="Exit to Gallery"><i class="bi bi-x-circle-fill"></i></button>
        </div>
    </div>
    
    <!-- A-Frame AR Scene -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        id="arScene">
        
        <!-- AR Marker -->
        <a-marker
            type="pattern"
            url="./pattern-ar_code_test1.patt"
            id="marker"
            smooth="true">
            <!-- Just marker detection, no 3D objects -->
        </a-marker>
        
        <!-- Camera -->
        <a-camera></a-camera>
    </a-scene>
    
    <script>
        // Sample data from artwork1.html
        const sampleData = [
            {current_corrections_count: 2, data_integrity: 0.85, correction_effectiveness: 0.78, active_corrections_count: 5},
            {current_corrections_count: 3, data_integrity: 0.92, correction_effectiveness: 0.81, active_corrections_count: 7},
            {current_corrections_count: 1, data_integrity: 0.76, correction_effectiveness: 0.69, active_corrections_count: 3},
            {current_corrections_count: 4, data_integrity: 0.88, correction_effectiveness: 0.85, active_corrections_count: 8},
            {current_corrections_count: 2, data_integrity: 0.91, correction_effectiveness: 0.77, active_corrections_count: 6}
        ];
        
        // Global Three.js variables
        let scene, camera, renderer;
        let networkNodes = [], networkEdges = [], centralCore = null;
        let networkGraph = { nodes: [] };
        let isAnimating = true, isWireframe = false;
        let colorSchemeIndex = 0;
        
        const colorSchemes = [
            { name: 'UserGreyGradient', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] },
            { name: 'GreyGradientAlt', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] },
            { name: 'MonochromeGradient', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] },
            { name: 'GreyScale', colors: ['#E9EAEB', '#BEC3C5', '#989C9E', '#747779', '#525455', '#323334', '#151616'] }
        ];
        
        // Three.js Animation System
        class ThreeJSAnimation {
            constructor() {
                this.isInitialized = false;
                this.mouse = new THREE.Vector2();
                this.raycaster = new THREE.Raycaster();
                
                // Data overlay system - EXACT copy from artwork1.html
                this.overlayVisible = false;
                this.currentDataset = 0;
                this.dataUpdateInterval = null;
            }
            
            initialize() {
                if (this.isInitialized) return;
                
                const canvas = document.getElementById('visualizationCanvas');
                if (!canvas) return;
                
                const container = canvas.parentElement;
                const width = container.clientWidth;
                const height = container.clientHeight;
                
                // Scene setup - exact same as artwork1.html
                scene = new THREE.Scene();
                scene.background = null;
                
                // Camera setup with dynamic scaling for different devices
                camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
                
                // Calculate scale factor based on viewport size
                const minDimension = Math.min(width, height);
                const scaleFactor = this.calculateScaleFactor(minDimension);
                
                // Apply dynamic camera positioning
                const baseDistance = 20;
                const distance = baseDistance * scaleFactor;
                camera.position.set(distance, distance * 0.6, distance);
                camera.lookAt(0, 0, 0);
                
                // Renderer setup
                renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
                renderer.setSize(width, height);
                renderer.setClearColor(0x000000, 0);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // Lighting
                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(50, 50, 50);
                scene.add(directionalLight);
                
                this.setupMouseControls();
                this.createCorrectionNetwork();
                this.animate();
                
                window.addEventListener('resize', () => this.onWindowResize());
                
                this.isInitialized = true;
            }
            
            createCorrectionNetwork() {
                const n_nodes = 800;
                const coreRadius = 1.5, sphereRadius = 15;
                
                networkGraph.nodes = [];
                
                // Create 800 nodes - exact same logic as artwork1.html
                for (let i = 0; i < n_nodes; i++) {
                    const row = sampleData[i % sampleData.length];
                    const variation = (Math.random() - 0.5) * 0.2;
                    
                    const correctionIntensity = Math.min(1.0, (row.current_corrections_count + variation) / 5.0);
                    const systemHealth = Math.min(1.0, ((row.data_integrity + row.correction_effectiveness) / 2.0) + variation * 0.1);
                    const correctionBurden = Math.min(1.0, (row.active_corrections_count + Math.floor(variation * 3)) / 10.0);
                    
                    // Generate 3D position using rejection sampling
                    let x, y, z, distanceSquared;
                    do {
                        x = (Math.random() - 0.5) * 2;
                        y = (Math.random() - 0.5) * 2;
                        z = (Math.random() - 0.5) * 2;
                        distanceSquared = x*x + y*y + z*z;
                    } while (distanceSquared > 1 || distanceSquared < 0.01);
                    
                    const unitDistance = Math.sqrt(distanceSquared);
                    const minDistance = coreRadius + 0.5;
                    const actualDistance = minDistance + (unitDistance * (sphereRadius - minDistance));
                    
                    x = (x / unitDistance) * actualDistance;
                    y = (y / unitDistance) * actualDistance;
                    z = (z / unitDistance) * actualDistance;
                    
                    networkGraph.nodes.push({
                        id: i, intensity: correctionIntensity, health: systemHealth, burden: correctionBurden,
                        x: x, y: y, z: z, vx: 0, vy: 0, vz: 0
                    });
                }
                
                this.createSolidCore();
                this.createNetworkVisualization();
            }
            
            createSolidCore() {
                const coreGeometry = new THREE.SphereGeometry(1.5, 32, 32);
                const currentScheme = colorSchemes[colorSchemeIndex];
                const coreMaterial = new THREE.MeshLambertMaterial({
                    color: new THREE.Color(currentScheme.colors[currentScheme.colors.length - 1])
                });
                
                centralCore = new THREE.Mesh(coreGeometry, coreMaterial);
                centralCore.castShadow = true;
                scene.add(centralCore);
            }
            
            createNetworkVisualization() {
                // Clear existing
                networkNodes.forEach(node => scene.remove(node));
                networkEdges.forEach(edge => scene.remove(edge));
                networkNodes.length = 0;
                networkEdges.length = 0;
                
                const currentScheme = colorSchemes[colorSchemeIndex];
                const edgeColor = new THREE.Color(currentScheme.colors[currentScheme.colors.length - 2]);
                
                networkGraph.nodes.forEach((node, i) => {
                    // Create connection from center to node
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array([0, 0, 0, node.x, node.y, node.z]);
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    
                    const material = new THREE.LineBasicMaterial({
                        color: edgeColor, transparent: true, opacity: 0.7
                    });
                    
                    const edge = new THREE.Line(geometry, material);
                    scene.add(edge);
                    networkEdges.push(edge);
                    
                    // Create optimized node mesh - EXACT same as artwork1.html
                    const nodeGeometry = new THREE.SphereGeometry(0.2, 12, 12); // Reduced complexity
                    const colorIndex = Math.floor(node.intensity * (currentScheme.colors.length - 1));
                    const nodeMaterial = new THREE.MeshBasicMaterial({
                        color: new THREE.Color(currentScheme.colors[colorIndex]),
                        transparent: true, 
                        opacity: 0.8, 
                        wireframe: isWireframe
                    });
                    
                    const nodeMesh = new THREE.Mesh(nodeGeometry, nodeMaterial);
                    nodeMesh.position.set(node.x, node.y, node.z);
                    nodeMesh.userData = { nodeData: node, type: 'correction-node' };
                    scene.add(nodeMesh);
                    networkNodes.push(nodeMesh);
                });
            }
            
            setupMouseControls() {
                const canvas = document.getElementById('visualizationCanvas');
                let isInteracting = false;
                let previousMousePosition = { x: 0, y: 0 };
                let previousTouchDistance = 0;
                
                // Mouse controls - EXACT same as artwork1.html
                canvas.addEventListener('mousedown', (event) => {
                    isInteracting = true;
                    previousMousePosition = { x: event.clientX, y: event.clientY };
                    canvas.style.cursor = 'grabbing';
                    event.preventDefault();
                });
                
                canvas.addEventListener('mouseup', () => {
                    isInteracting = false;
                    canvas.style.cursor = 'grab';
                });
                
                canvas.addEventListener('mouseleave', () => {
                    isInteracting = false;
                    canvas.style.cursor = 'grab';
                });
                
                canvas.addEventListener('mousemove', (event) => {
                    if (!isInteracting) return;
                    
                    const deltaX = event.clientX - previousMousePosition.x;
                    const deltaY = event.clientY - previousMousePosition.y;
                    
                    this.rotateCamera(deltaX, deltaY);
                    
                    previousMousePosition = { x: event.clientX, y: event.clientY };
                    event.preventDefault();
                });
                
                // Mouse wheel zoom
                canvas.addEventListener('wheel', (event) => {
                    const zoomSpeed = 0.1;
                    const zoomDirection = event.deltaY > 0 ? 1 : -1;
                    this.zoomCamera(zoomDirection * zoomSpeed);
                    event.preventDefault();
                });
                
                // Touch controls for mobile - EXACT same as artwork1.html
                canvas.addEventListener('touchstart', (event) => {
                    event.preventDefault();
                    
                    if (event.touches.length === 1) {
                        // Single touch - rotation
                        isInteracting = true;
                        const touch = event.touches[0];
                        previousMousePosition = { x: touch.clientX, y: touch.clientY };
                    } else if (event.touches.length === 2) {
                        // Two finger pinch - zoom
                        const touch1 = event.touches[0];
                        const touch2 = event.touches[1];
                        const distance = Math.sqrt(
                            Math.pow(touch2.clientX - touch1.clientX, 2) +
                            Math.pow(touch2.clientY - touch1.clientY, 2)
                        );
                        previousTouchDistance = distance;
                    }
                });
                
                canvas.addEventListener('touchmove', (event) => {
                    event.preventDefault();
                    
                    if (event.touches.length === 1 && isInteracting) {
                        // Single touch rotation
                        const touch = event.touches[0];
                        const deltaX = touch.clientX - previousMousePosition.x;
                        const deltaY = touch.clientY - previousMousePosition.y;
                        
                        this.rotateCamera(deltaX, deltaY);
                        
                        previousMousePosition = { x: touch.clientX, y: touch.clientY };
                    } else if (event.touches.length === 2) {
                        // Two finger pinch zoom
                        const touch1 = event.touches[0];
                        const touch2 = event.touches[1];
                        const distance = Math.sqrt(
                            Math.pow(touch2.clientX - touch1.clientX, 2) +
                            Math.pow(touch2.clientY - touch1.clientY, 2)
                        );
                        
                        if (previousTouchDistance > 0) {
                            const zoomDelta = (distance - previousTouchDistance) * 0.01;
                            this.zoomCamera(-zoomDelta);
                        }
                        
                        previousTouchDistance = distance;
                    }
                });
                
                canvas.addEventListener('touchend', (event) => {
                    event.preventDefault();
                    isInteracting = false;
                    previousTouchDistance = 0;
                });
            }
            
            rotateCamera(deltaX, deltaY) {
                const rotationSpeed = 0.005;
                const spherical = new THREE.Spherical();
                spherical.setFromVector3(camera.position);
                
                spherical.theta -= deltaX * rotationSpeed;
                spherical.phi += deltaY * rotationSpeed;
                
                // Constrain phi to prevent flipping
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
                
                camera.position.setFromSpherical(spherical);
                camera.lookAt(0, 0, 0);
            }
            
            zoomCamera(delta) {
                const direction = camera.position.clone().normalize();
                const newPosition = camera.position.clone().add(direction.multiplyScalar(delta));
                
                // Constrain zoom distance
                const minDistance = 5;
                const maxDistance = 100;
                const distance = newPosition.length();
                
                if (distance >= minDistance && distance <= maxDistance) {
                    camera.position.copy(newPosition);
                }
            }
            
            calculateScaleFactor(minDimension) {
                // Dynamic scaling based on device size
                if (minDimension <= 480) {
                    return 0.8; // Phone
                } else if (minDimension <= 768) {
                    return 0.9; // Small tablet
                } else if (minDimension <= 1024) {
                    return 1.0; // iPad
                } else {
                    return 1.1; // Desktop
                }
            }
            
            animate() {
                if (!isAnimating) return;
                
                requestAnimationFrame(() => this.animate());
                
                // Rotate central core
                if (centralCore) {
                    centralCore.rotation.y += 0.005;
                    centralCore.rotation.x += 0.002;
                }
                
                renderer.render(scene, camera);
            }
            
            onWindowResize() {
                const canvas = document.getElementById('visualizationCanvas');
                const container = canvas.parentElement;
                const width = container.clientWidth;
                const height = container.clientHeight;
                
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            }
            
            show() {
                const container = document.getElementById('visualizationContainer');
                container.classList.add('active');
            }
            
            hide() {
                const container = document.getElementById('visualizationContainer');
                container.classList.remove('active');
            }
            
            // Data overlay system methods - EXACT copy from artwork1.html
            handleNodeClick(event, canvas) {
                const rect = canvas.getBoundingClientRect();
                this.mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                this.mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                this.raycaster.setFromCamera(this.mouse, camera);
                
                const clickableObjects = [];
                scene.traverse((child) => {
                    // Include both mesh objects (nodes) and line objects (connections)
                    if (child.isMesh || child.isLine || child.isLineSegments || child.type === 'Line') {
                        clickableObjects.push(child);
                    }
                });
                
                const intersects = this.raycaster.intersectObjects(clickableObjects);
                if (intersects.length > 0) {
                    if (this.overlayVisible) {
                        this.cycleToNextDataset();
                    } else {
                        this.showDataOverlay();
                    }
                }
            }
            
            showDataOverlay() {
                this.overlayVisible = true;
                const overlay = document.getElementById('dataOverlay');
                overlay.classList.add('active');
                this.startDataCycling();
            }
            
            hideDataOverlay() {
                this.overlayVisible = false;
                const overlay = document.getElementById('dataOverlay');
                overlay.classList.remove('active');
                this.stopDataCycling();
            }
            
            cycleToNextDataset() {
                this.currentDataset = (this.currentDataset + 1) % 4;
                this.updateOverlayData();
            }
            
            updateOverlayData() {
                const datasets = [
                    { title: 'Core Efficiency', unit: '%', baseValue: 87.3 },
                    { title: 'Network Load', unit: '%', baseValue: 64.2 },
                    { title: 'Active Corrections', unit: '', baseValue: 142 },
                    { title: 'Data<br>Integrity', unit: '%', baseValue: 91.8 }
                ];
                
                const dataset = datasets[this.currentDataset];
                document.getElementById('metricLabel').innerHTML = dataset.title;
                document.getElementById('metricUnit').textContent = dataset.unit;
                
                // Start with base value, will be updated by cycling
                document.getElementById('metricValue').textContent = dataset.baseValue;
            }
            
            startDataCycling() {
                if (this.dataUpdateInterval) return;
                
                this.dataUpdateInterval = setInterval(() => {
                    this.updateDynamicData();
                }, 150); // Update every 150ms for rapid cycling
            }
            
            stopDataCycling() {
                if (this.dataUpdateInterval) {
                    clearInterval(this.dataUpdateInterval);
                    this.dataUpdateInterval = null;
                }
            }
            
            updateDynamicData() {
                const datasets = [
                    { title: 'Core Efficiency', unit: '%', baseValue: 87.3, range: 15 },
                    { title: 'Network Load', unit: '%', baseValue: 64.2, range: 20 },
                    { title: 'Active Corrections', unit: '', baseValue: 142, range: 30 },
                    { title: 'Data<br>Integrity', unit: '%', baseValue: 91.8, range: 8 }
                ];
                
                const dataset = datasets[this.currentDataset];
                const variation = (Math.random() - 0.5) * dataset.range;
                let newValue = dataset.baseValue + variation;
                
                // Format the value appropriately
                if (dataset.unit === '%') {
                    newValue = Math.max(0, Math.min(100, newValue));
                    document.getElementById('metricValue').textContent = newValue.toFixed(1);
                } else {
                    newValue = Math.max(0, newValue);
                    document.getElementById('metricValue').textContent = Math.round(newValue);
                }
            }
            
            toggleDataOverlay() {
                if (this.overlayVisible) {
                    this.hideDataOverlay();
                } else {
                    this.showDataOverlay();
                }
            }
        }
        
        let threeJSAnimation = null;
        
        // Auto-start AR when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const arStatus = document.getElementById('arStatus');
            
            console.log('Auto-starting AR...');
            console.log('Viewport:', window.innerWidth, 'x', window.innerHeight);
            
            // Initialize Three.js animation system
            threeJSAnimation = new ThreeJSAnimation();
            
            // Setup marker detection
            const marker = document.getElementById('marker');
            
            marker.addEventListener('markerFound', () => {
                console.log('AR Marker detected!');
                arStatus.innerHTML = '✅ AR Marker Found!';
                arStatus.style.background = 'rgba(0,128,0,0.7)';
                
                // Initialize and show Three.js animation
                threeJSAnimation.initialize();
                threeJSAnimation.show();
                
                // Show AR controls - EXACT copy from artwork1.html
                const arControls = document.querySelector('.ar-controls-container');
                if (arControls) {
                    arControls.classList.add('ar-active');
                }
            });
            
            marker.addEventListener('markerLost', () => {
                console.log('AR Marker lost');
                arStatus.innerHTML = '🔍 Looking for AR Marker...';
                arStatus.style.background = 'rgba(0,0,0,0.7)';
                
                // Keep animation visible once triggered
            });
            
            // Initial status
            arStatus.innerHTML = '🔍 Looking for AR Marker...';
            
            // Data overlay event listeners - EXACT copy from artwork1.html
            const canvas = document.getElementById('visualizationCanvas');
            const overlayClose = document.getElementById('overlayClose');
            
            // Canvas click handler for node interactions
            canvas.addEventListener('click', (event) => {
                if (threeJSAnimation && threeJSAnimation.isInitialized) {
                    threeJSAnimation.handleNodeClick(event, canvas);
                }
            });
            
            // Touch handler for mobile devices
            let isTouchDragging = false;
            let touchStartTime = 0;
            
            canvas.addEventListener('touchstart', (event) => {
                isTouchDragging = false;
                touchStartTime = Date.now();
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (event) => {
                isTouchDragging = true;
            }, { passive: false });
            
            canvas.addEventListener('touchend', (event) => {
                event.preventDefault();
                const touchDuration = Date.now() - touchStartTime;
                
                // Only trigger click if it wasn't a drag and was a quick tap
                if (!isTouchDragging && touchDuration < 300) {
                    if (threeJSAnimation && threeJSAnimation.isInitialized && event.changedTouches.length > 0) {
                        const touch = event.changedTouches[0];
                        const syntheticEvent = {
                            clientX: touch.clientX,
                            clientY: touch.clientY,
                            target: document.getElementById('visualizationCanvas')
                        };
                        threeJSAnimation.handleNodeClick(syntheticEvent, document.getElementById('visualizationCanvas'));
                    }
                }
                isTouchDragging = false;
            }, { passive: false });
            
            // Close button handler
            overlayClose.addEventListener('click', () => {
                if (threeJSAnimation) {
                    threeJSAnimation.hideDataOverlay();
                }
            });
            
            // Button functionality - Data button and Exit button only
            const dataBtn = document.getElementById('dataBtn');
            const exitBtn = document.getElementById('exitBtn');
            
            // Data button - Toggle data overlay
            dataBtn.addEventListener('click', () => {
                if (threeJSAnimation && threeJSAnimation.isInitialized) {
                    threeJSAnimation.toggleDataOverlay();
                    dataBtn.classList.toggle('active');
                }
            });
            
            // Exit button - Reset to blank camera, ready for next AR scan
            exitBtn.addEventListener('click', () => {
                // Hide AR controls
                const arControls = document.querySelector('.ar-controls-container');
                if (arControls) {
                    arControls.classList.remove('ar-active');
                }
                
                // Hide Three.js animation
                if (threeJSAnimation) {
                    threeJSAnimation.hide();
                    threeJSAnimation.hideDataOverlay();
                }
                
                // Reset data button active state
                dataBtn.classList.remove('active');
                
                // Reset AR status - ready for next marker scan
                const arStatus = document.getElementById('arStatus');
                arStatus.innerHTML = '🔍 Looking for AR Marker...';
                arStatus.style.background = 'rgba(0,0,0,0.7)';
                
                // Page stays open, camera continues running, ready for next AR marker
                console.log('AR experience reset - ready for next marker scan');
            });
        });
        
        // Disable device motion/orientation permissions to prevent invasive prompts
        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
            DeviceMotionEvent.requestPermission = () => Promise.resolve('denied');
        }
        if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
            DeviceOrientationEvent.requestPermission = () => Promise.resolve('denied');
        }
        
        // Log initial viewport info
        console.log('Page loaded - Viewport:', window.innerWidth, 'x', window.innerHeight);
        console.log('User Agent:', navigator.userAgent);
    </script>
</body>
